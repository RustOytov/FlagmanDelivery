openapi: 3.0.3
info:
  title: Flagman Delivery API
  version: 1.0.0
  description: |
    OpenAPI specification generated from the FastAPI backend in `hac.new` and normalized for iOS client generation.
    The backend exposes JWT bearer authentication via `/api/auth/login` and `/api/auth/refresh`.
    Password reset and email verification flows are also described so the spec can be used for iOS client generation.
servers:
  - url: http://localhost:8000
    description: Local development
tags:
  - name: auth
  - name: customers
  - name: couriers
  - name: businesses
security:
  - bearerAuth: []
paths:
  /api/auth/register:
    post:
      tags: [auth]
      operationId: registerUser
      security: []
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
            example:
              email: customer@example.com
              password: password123
              full_name: Ivan Petrov
              role: customer
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegisterResponse'
              example:
                id: 101
                email: customer@example.com
                full_name: Ivan Petrov
                role: customer
                message: Регистрация успешна
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/login:
    post:
      tags: [auth]
      operationId: loginUser
      security: []
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
            example:
              username: customer@example.com
              password: password123
      responses:
        '200':
          description: JWT access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                access_token: eyJhbGciOi...
                refresh_token: eyJhbGciOi...refresh
                token_type: bearer
                role: customer
                expires_in: 1800
                refresh_expires_in: 604800
                is_verified: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/refresh:
    post:
      tags: [auth]
      operationId: refreshAuthToken
      security: []
      summary: Refresh access token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
            example:
              refresh_token: opaque-or-jwt-refresh-token
      responses:
        '200':
          description: Refreshed token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/logout:
    post:
      tags: [auth]
      operationId: logoutUser
      summary: Logout current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
            example:
              refresh_token: opaque-or-jwt-refresh-token
      responses:
        '200':
          description: Logout accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionMessageResponse'
              example:
                message: Session closed
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/me:
    get:
      tags: [auth]
      operationId: getCurrentUser
      summary: Get current authenticated user with role profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
              example:
                id: 101
                email: customer@example.com
                full_name: Ivan Petrov
                role: customer
                is_verified: true
                profile:
                  id: 15
                  user_id: 101
                  phone: "+79998887766"
                  default_address: "Москва, Арбат 10"
                  default_coordinates:
                    lat: 55.7525
                    lon: 37.5929
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/auth/forgot-password:
    post:
      tags: [auth]
      operationId: requestPasswordReset
      security: []
      summary: Request password reset link or token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
            example:
              email: customer@example.com
      responses:
        '200':
          description: Reset flow started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionMessageResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/reset-password:
    post:
      tags: [auth]
      operationId: confirmPasswordReset
      security: []
      summary: Confirm password reset with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordConfirmRequest'
            example:
              token: reset-token
              new_password: new-password-123
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/verify-email/request:
    post:
      tags: [auth]
      operationId: requestEmailVerification
      summary: Send or regenerate email verification token
      responses:
        '200':
          description: Verification flow started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionMessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/verify-email/confirm:
    post:
      tags: [auth]
      operationId: confirmEmailVerification
      security: []
      summary: Confirm email with verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
            example:
              token: verify-token
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/customers/profile:
    get:
      tags: [customers]
      operationId: getCustomerProfile
      summary: Get current customer profile
      responses:
        '200':
          description: Customer profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [customers]
      operationId: upsertCustomerProfile
      summary: Create or update current customer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerProfileUpdate'
            example:
              phone: "+79998887766"
              default_address: "Москва, ул. Арбат, 10"
              default_coordinates:
                lat: 55.7525
                lon: 37.5929
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/customers/stores:
    get:
      tags: [customers]
      operationId: listCustomerStores
      security: []
      summary: List active stores, optionally filtered by delivery zone point
      parameters:
        - $ref: '#/components/parameters/LatQuery'
        - $ref: '#/components/parameters/LonQuery'
      responses:
        '200':
          description: Active stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StorePublicResponse'
              example:
                - id: 1
                  name: Bella Italia
                  address: "Москва, Арбат, 18"
                  delivery_zone:
                    type: Polygon
                    coordinates:
                      - - [37.58, 55.76]
                        - [37.61, 55.77]
                        - [37.63, 55.74]
                        - [37.58, 55.76]
                  is_active: true
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/customers/stores/{store_id}/menu:
    get:
      tags: [customers]
      operationId: getCustomerStoreMenu
      security: []
      summary: Get public customer menu for store
      parameters:
        - $ref: '#/components/parameters/StoreID'
      responses:
        '200':
          description: Store menu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerMenuResponse'
              example:
                store_id: 1
                categories:
                  - id: 11
                    name: Пицца
                    sort_order: 0
                    items:
                      - id: 101
                        name: Пепперони
                        description: Томатный соус, сыр, пепперони
                        price: "790.00"
                        image_url: https://cdn.example.com/pepperoni.png
        '404':
          $ref: '#/components/responses/NotFound'

  /api/customers/orders:
    post:
      tags: [customers]
      operationId: createCustomerOrder
      summary: Create customer order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
            example:
              store_id: 1
              delivery_address: "Москва, ул. Арбат, 10"
              delivery_coordinates:
                lat: 55.7525
                lon: 37.5929
              items:
                - item_id: 101
                  quantity: 2
              comment: "Не звонить в дверь"
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [customers]
      operationId: listCustomerOrders
      summary: List current customer orders
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/customers/orders/{order_id}/status:
    get:
      tags: [customers]
      operationId: getCustomerOrderStatus
      summary: Get customer order status with courier location and ETA
      parameters:
        - $ref: '#/components/parameters/OrderID'
      responses:
        '200':
          description: Order status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatusResponse'
              example:
                status: assigned
                courier_location:
                  lat: 55.7601
                  lon: 37.6112
                estimated_time: 25
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/customers/track/{order_id}:
    get:
      tags: [customers]
      operationId: trackCustomerCourier
      summary: Track courier location for order
      parameters:
        - $ref: '#/components/parameters/OrderID'
      responses:
        '200':
          description: Courier location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourierLocationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/customers/orders/{order_id}/cancel:
    post:
      tags: [customers]
      operationId: cancelCustomerOrder
      summary: Cancel customer order while still cancellable
      parameters:
        - $ref: '#/components/parameters/OrderID'
      responses:
        '200':
          description: Cancelled order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/couriers/profile:
    get:
      tags: [couriers]
      operationId: getCourierProfile
      summary: Get current courier profile
      responses:
        '200':
          description: Courier profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourierProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [couriers]
      operationId: upsertCourierProfile
      summary: Update courier profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourierProfileUpdate'
            example:
              phone: "+79994443322"
              vehicle_type: bicycle
              license_plate: null
      responses:
        '200':
          description: Updated courier profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourierProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/couriers/shift:
    patch:
      tags: [couriers]
      operationId: toggleCourierShift
      summary: Toggle courier online/offline shift status
      responses:
        '200':
          description: Shift state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourierShiftResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/couriers/available-orders:
    get:
      tags: [couriers]
      operationId: listCourierAvailableOrders
      summary: List available orders for online courier
      responses:
        '200':
          description: Available orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailableOrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/couriers/orders/{order_id}/accept:
    post:
      tags: [couriers]
      operationId: acceptCourierOrder
      summary: Accept available ready order
      parameters:
        - $ref: '#/components/parameters/OrderID'
      responses:
        '200':
          description: Accepted order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptOrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/couriers/current-order:
    get:
      tags: [couriers]
      operationId: getCourierCurrentOrder
      summary: Get currently assigned accepted order
      responses:
        '200':
          description: Current order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/couriers/current-order/status:
    patch:
      tags: [couriers]
      operationId: updateCourierCurrentOrderStatus
      summary: Mark current order as picked up or delivered
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourierCurrentOrderStatusRequest'
            example:
              status: delivered
      responses:
        '200':
          description: Updated current order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/couriers/history:
    get:
      tags: [couriers]
      operationId: getCourierHistory
      summary: Get delivered history for current courier
      responses:
        '200':
          description: Courier history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourierHistoryOrderItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/couriers/location:
    post:
      tags: [couriers]
      operationId: updateCourierLocation
      summary: Send current courier GPS position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationUpdate'
            example:
              lat: 55.7601
              lon: 37.6112
      responses:
        '200':
          description: Updated courier profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourierProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/businesses/organizations:
    get:
      tags: [businesses]
      operationId: listBusinessOrganizations
      summary: List organizations owned by current business user
      responses:
        '200':
          description: Organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [businesses]
      operationId: createBusinessOrganization
      summary: Create business organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessOrganizationCreateRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/businesses/organizations/{org_id}:
    put:
      tags: [businesses]
      operationId: updateBusinessOrganization
      summary: Update organization
      parameters:
        - $ref: '#/components/parameters/OrganizationID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessOrganizationUpdateRequest'
      responses:
        '200':
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/businesses/stores:
    get:
      tags: [businesses]
      operationId: listBusinessStores
      summary: List stores for current owner, optionally filtered by organization
      parameters:
        - name: organization_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BusinessStoreResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [businesses]
      operationId: createBusinessStore
      summary: Create a store with GeoJSON delivery zone polygon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessStoreCreateRequest'
      responses:
        '201':
          description: Store created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessStoreResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/businesses/stores/{store_id}:
    put:
      tags: [businesses]
      operationId: updateBusinessStore
      summary: Update business store
      parameters:
        - $ref: '#/components/parameters/StoreID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessStoreUpdateRequest'
      responses:
        '200':
          description: Updated store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessStoreResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/businesses/menu/categories:
    post:
      tags: [businesses]
      operationId: createMenuCategory
      summary: Create menu category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuCategoryCreate'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuCategoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/businesses/menu/categories/{category_id}/sort:
    put:
      tags: [businesses]
      operationId: updateMenuCategorySort
      summary: Update category sort order
      parameters:
        - $ref: '#/components/parameters/CategoryID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuCategorySortRequest'
            example:
              sort_order: 2
      responses:
        '200':
          description: Updated category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuCategoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/businesses/menu/items:
    post:
      tags: [businesses]
      operationId: createMenuItem
      summary: Create menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItemCreate'
      responses:
        '201':
          description: Created menu item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/businesses/menu/items/{item_id}:
    put:
      tags: [businesses]
      operationId: updateMenuItem
      summary: Update menu item
      parameters:
        - $ref: '#/components/parameters/ItemID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItemUpdate'
      responses:
        '200':
          description: Updated menu item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [businesses]
      operationId: hideMenuItem
      summary: Soft-delete menu item by marking it unavailable
      parameters:
        - $ref: '#/components/parameters/ItemID'
      responses:
        '200':
          description: Updated menu item with is_available=false
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/businesses/orders:
    get:
      tags: [businesses]
      operationId: listBusinessOrders
      summary: List business orders
      parameters:
        - name: store_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BusinessOrderListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/businesses/orders/{order_id}/status:
    patch:
      tags: [businesses]
      operationId: patchBusinessOrderStatus
      summary: Change business-visible order status
      parameters:
        - $ref: '#/components/parameters/OrderID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessOrderStatusPatchRequest'
            example:
              status: ready
      responses:
        '200':
          description: Updated order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessOrderListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    LatQuery:
      name: lat
      in: query
      schema:
        type: number
        format: double
        minimum: -90
        maximum: 90
    LonQuery:
      name: lon
      in: query
      schema:
        type: number
        format: double
        minimum: -180
        maximum: 180
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    OffsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    StoreID:
      name: store_id
      in: path
      required: true
      schema:
        type: integer
    OrderID:
      name: order_id
      in: path
      required: true
      schema:
        type: integer
    OrganizationID:
      name: org_id
      in: path
      required: true
      schema:
        type: integer
    CategoryID:
      name: category_id
      in: path
      required: true
      schema:
        type: integer
    ItemID:
      name: item_id
      in: path
      required: true
      schema:
        type: integer
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: Адрес доставки вне зоны доставки магазина
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: Недействительный или просроченный токен
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: Требуется роль бизнес-пользователя
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: Заказ не найден
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: Заказ недоступен или уже назначен
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
    ValidationIssue:
      type: object
      required: [loc, msg, type]
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string
    ValidationErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
    UserRole:
      type: string
      enum: [customer, courier, business, admin]
    VehicleType:
      type: string
      enum: [foot, bicycle, motorcycle, car]
    OrderStatus:
      type: string
      enum: [draft, pending, confirmed, preparing, ready, assigned, picked_up, on_the_way, delivered, cancelled]
    CourierAvailability:
      type: string
      enum: [offline, online, busy]
    BusinessOrderStatusAction:
      type: string
      enum: [confirmed, preparing, ready, cancelled]
    CourierDeliveryStatusAction:
      type: string
      enum: [picked_up, delivered]
    Coordinate:
      type: object
      required: [lat, lon]
      properties:
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double
    GeoJSONPolygon:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Polygon]
        coordinates:
          type: array
          items:
            type: array
            items:
              type: array
              minItems: 2
              maxItems: 2
              items:
                type: number
                format: double
    UserRegister:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        full_name:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
    UserLogin:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    ActionMessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
